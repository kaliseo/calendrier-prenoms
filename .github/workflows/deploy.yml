name: Vérification du calendrier

# GitHub Pages sert directement les fichiers de la racine de la branche `main`
# (mode « Deploy from a branch »). Ce workflow ne déploie donc pas : il régénère
# le .ics et vérifie qu'il est valide et bien à jour par rapport aux données.

on:
  push:
    branches: ["main", "claude/nameday-calendar-url-k2xl9w"]
  pull_request:
  workflow_dispatch:

jobs:
  verifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Régénérer le fichier .ics
        run: node src/generate-ics.js
      - name: Vérifier le calendrier
        run: node test/validate.js
      - name: Vérifier que le .ics commité est à jour
        run: |
          if ! git diff --quiet -- calendrier-prenoms.ics; then
            echo "::error::calendrier-prenoms.ics n'est pas à jour. Lancez 'node src/generate-ics.js' et committez."
            git --no-pager diff -- calendrier-prenoms.ics
            exit 1
          fi
          echo "✓ Le fichier .ics commité correspond aux données."
